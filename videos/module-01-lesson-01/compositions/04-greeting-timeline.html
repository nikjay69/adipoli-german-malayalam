<!doctype html>
<html><body><template>
  <style>
    #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; color: #f7f0dd; font-family: "EB Garamond", serif; }
    .ground { position: absolute; inset: 0; background: radial-gradient(circle at 12% 35%, rgba(157,196,255,.17), rgba(157,196,255,0) 28%), radial-gradient(circle at 82% 35%, rgba(241,210,122,.18), rgba(241,210,122,0) 31%), #0d1a0d; }
    .content { position: relative; width: 100%; height: 100%; padding: 96px 144px; display: flex; flex-direction: column; justify-content: center; gap: 64px; }
    .eyebrow, .time, .context, .night-note { font-family: "IBM Plex Mono", monospace; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; }
    .eyebrow { color: #f1d27a; font-size: 22px; }
    .title { font: 700 84px/1 "Oswald", sans-serif; }
    .timeline { position: relative; display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; padding-top: 54px; }
    .rail { position: absolute; left: 7%; right: 7%; top: 98px; height: 7px; border-radius: 999px; background: #f1d27a; }
    .stop { position: relative; z-index: 1; min-height: 330px; padding: 0 22px 34px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 24px; }
    .dot { width: 36px; height: 36px; border-radius: 50%; background: #f1d27a; border: 8px solid #0d1a0d; box-shadow: 0 0 0 3px #f1d27a; }
    .time { color: #c8c2b1; font-size: 18px; }
    .phrase { margin-top: 26px; font-size: 48px; line-height: 1.06; }
    .context { color: #f1d27a; font-size: 17px; }
    .night-note { align-self: center; padding: 20px 32px; border-radius: 999px; border: 2px solid rgba(192,57,43,.65); background: rgba(192,57,43,.11); color: #ffc9c2; font-size: 18px; }
    .night-note strong { color: #bcf7d0; }
  </style>
  <div id="root" data-composition-id="m1l1-greeting-timeline" data-start="0" data-duration="10" data-width="1920" data-height="1080">
    <div id="m1l1-greeting-timeline-ground" class="clip ground" data-start="0" data-duration="10" data-track-index="0"></div>
    <div id="m1l1-greeting-timeline-content" class="clip content" data-start="0" data-duration="10" data-track-index="1">
      <div class="eyebrow">Greeting by time</div><div class="title">Use the useful set</div>
      <div class="timeline"><div class="rail"></div>
        <div class="stop"><div class="dot"></div><div class="time">09:00</div><div class="phrase">Guten Morgen</div><div class="context">morning</div></div>
        <div class="stop"><div class="dot"></div><div class="time">14:00</div><div class="phrase">Guten Tag</div><div class="context">day / formal</div></div>
        <div class="stop"><div class="dot"></div><div class="time">18:00</div><div class="phrase">Guten Abend</div><div class="context">evening</div></div>
        <div class="stop"><div class="dot"></div><div class="time">Leaving</div><div class="phrase">Auf Wiedersehen</div><div class="context">goodbye</div></div>
      </div>
      <div class="night-note">Gute Nacht = going to sleep · meeting someone? <strong>Guten Abend.</strong></div>
    </div>
  </div>
  <script>
    (() => {
    window.__timelines=window.__timelines||{};
    const tl=gsap.timeline({paused:true,defaults:{ease:"power3.out"}});
    tl.fromTo(".eyebrow",{opacity:0,x:-40},{opacity:1,x:0,duration:.5},0)
      .fromTo(".title",{opacity:0,y:36},{opacity:1,y:0,duration:.62},.12)
      .fromTo(".rail",{scaleX:0,transformOrigin:"left center"},{scaleX:1,duration:1.2,ease:"power2.out"},.42)
      .fromTo(".stop",{opacity:0,y:38},{opacity:1,y:0,duration:.58,stagger:.18},.56)
      .fromTo(".dot",{scale:0},{scale:1,duration:.48,stagger:.18},.6)
      .fromTo(".night-note",{opacity:0,y:24},{opacity:1,y:0,duration:.55},1.55);
    window.__timelines["m1l1-greeting-timeline"]=tl;
    })();
  </script>
</template></body></html>
