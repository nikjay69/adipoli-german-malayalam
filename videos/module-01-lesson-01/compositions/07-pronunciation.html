<!doctype html>
<html><body><template>
  <style>
    #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; color: #f7f0dd; font-family: "EB Garamond", serif; }
    .ground { position: absolute; inset: 0; background: radial-gradient(circle at 28% 53%, rgba(157,196,255,.18), rgba(157,196,255,0) 26%), radial-gradient(circle at 72% 53%, rgba(241,210,122,.15), rgba(241,210,122,0) 28%), #0d1a0d; }
    .content { position: relative; width: 100%; height: 100%; padding: 96px 144px; display: flex; flex-direction: column; justify-content: center; gap: 46px; }
    .eyebrow, .cue, .hint, .wrong, .repeat, .principle { font-family: "IBM Plex Mono", monospace; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .eyebrow { color: #9dc4ff; font-size: 22px; }
    .title { font: 700 82px/1 "Oswald", sans-serif; }
    .targets { display: grid; grid-template-columns: 1fr 1fr; gap: 42px; }
    .target { position: relative; min-height: 430px; padding: 52px; border-radius: 28px; border: 2px solid rgba(241,210,122,.25); background: rgba(22,36,22,.90); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 24px; overflow: hidden; }
    .ring { position: absolute; width: 330px; height: 330px; border-radius: 50%; border: 3px solid rgba(157,196,255,.18); box-shadow: 0 0 0 34px rgba(157,196,255,.05), 0 0 0 70px rgba(157,196,255,.03); }
    .word { position: relative; z-index: 1; font-size: 126px; line-height: .9; }
    .hint { position: relative; z-index: 1; color: #c8c2b1; font-size: 19px; }
    .wrong { color: #ffc9c2; font-size: 18px; text-decoration: line-through; text-decoration-thickness: 3px; }
    .footer { display: flex; align-items: center; justify-content: space-between; }
    .repeat { color: #f1d27a; font-size: 18px; display: flex; gap: 14px; align-items: center; }
    .pip { width: 18px; height: 18px; border-radius: 50%; background: #f1d27a; }
    .principle { color: #bcf7d0; font-size: 18px; }
  </style>
  <div id="root" data-composition-id="m1l1-pronunciation" data-start="0" data-duration="8" data-width="1920" data-height="1080">
    <div id="m1l1-pronunciation-ground" class="clip ground" data-start="0" data-duration="8" data-track-index="0"></div>
    <div id="m1l1-pronunciation-content" class="clip content" data-start="0" data-duration="8" data-track-index="1">
      <div class="eyebrow">Model audio · repeat</div><div class="title">Two sound targets</div>
      <div class="targets"><div class="target"><div class="ring"></div><div class="word">Ich</div><div class="hint">soft ch</div><div class="wrong">not “Ish”</div></div><div class="target"><div class="ring"></div><div class="word">Deutsch</div><div class="hint">≈ “doych”</div><div class="wrong">not Deutschland</div></div></div>
      <div class="footer"><div class="repeat">Repeat × 3 <span class="pip"></span><span class="pip"></span><span class="pip"></span></div><div class="principle">Understandable &gt; perfect</div></div>
    </div>
  </div>
  <script>
    (() => {
    window.__timelines=window.__timelines||{};
    const tl=gsap.timeline({paused:true,defaults:{ease:"power3.out"}});
    tl.fromTo(".eyebrow",{opacity:0,x:-40},{opacity:1,x:0,duration:.5},0)
      .fromTo(".title",{opacity:0,y:34},{opacity:1,y:0,duration:.62},.12)
      .fromTo(".target",{opacity:0,y:34,scale:.97},{opacity:1,y:0,scale:1,duration:.68,stagger:.14},.38)
      .fromTo(".ring",{opacity:0,scale:.72},{opacity:1,scale:1,duration:.82,stagger:.14,ease:"sine.inOut"},.55)
      .fromTo(".word",{opacity:0,y:28},{opacity:1,y:0,duration:.56,stagger:.14},.72)
      .fromTo(".hint, .wrong",{opacity:0,y:14},{opacity:1,y:0,duration:.42,stagger:.06},1.02)
      .fromTo(".pip",{opacity:0,scale:0},{opacity:1,scale:1,duration:.35,stagger:.12},1.38)
      .fromTo(".principle",{opacity:0,x:34},{opacity:1,x:0,duration:.48},1.52);
    window.__timelines["m1l1-pronunciation"]=tl;
    })();
  </script>
</template></body></html>
