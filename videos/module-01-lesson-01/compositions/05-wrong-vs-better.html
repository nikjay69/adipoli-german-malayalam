<!doctype html>
<html><body><template>
  <style>
    #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; color: #f7f0dd; font-family: "EB Garamond", serif; }
    .ground { position: absolute; inset: 0; background: radial-gradient(circle at 50% 48%, rgba(241,210,122,.17), rgba(241,210,122,0) 36%), #0d1a0d; }
    .content { position: relative; width: 100%; height: 100%; padding: 96px 144px; display: flex; flex-direction: column; justify-content: center; gap: 44px; perspective: 1800px; }
    .eyebrow, .tag, .time, .note { font-family: "IBM Plex Mono", monospace; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; }
    .eyebrow { color: #f1d27a; font-size: 22px; }
    .title { font: 700 82px/1 "Oswald", sans-serif; }
    .cards { display: grid; grid-template-columns: 1fr 100px 1fr; gap: 34px; align-items: center; transform-style: preserve-3d; }
    .card { min-height: 470px; padding: 54px; border-radius: 28px; background: #162416; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid rgba(247,240,221,.14); transform-style: preserve-3d; }
    .wrong { transform: rotateY(12deg); box-shadow: -22px 28px 70px rgba(0,0,0,.45); border-color: rgba(192,57,43,.55); }
    .better { transform: rotateY(-12deg); box-shadow: 22px 28px 70px rgba(0,0,0,.45); border-color: rgba(63,191,117,.62); }
    .tag { width: max-content; padding: 12px 18px; border-radius: 999px; font-size: 17px; }
    .wrong .tag { color: #ffc9c2; background: rgba(192,57,43,.15); }
    .better .tag { color: #bcf7d0; background: rgba(63,191,117,.15); }
    .phrase { font-size: 88px; line-height: .98; }
    .time { color: #c8c2b1; font-size: 18px; }
    .arrow { font: 700 76px/1 "Oswald", sans-serif; text-align: center; color: #f1d27a; }
    .note { text-align: center; font-size: 18px; color: #c8c2b1; }
  </style>
  <div id="root" data-composition-id="m1l1-wrong-better" data-start="0" data-duration="8" data-width="1920" data-height="1080">
    <div id="m1l1-wrong-better-ground" class="clip ground" data-start="0" data-duration="8" data-track-index="0"></div>
    <div id="m1l1-wrong-better-content" class="clip content" data-start="0" data-duration="8" data-track-index="1">
      <div class="eyebrow">Common beginner repair</div><div class="title">At 6 PM, meeting someone…</div>
      <div class="cards"><div class="card wrong"><div class="tag">Not here</div><div class="phrase">Gute Nacht</div><div class="time">going to sleep</div></div><div class="arrow">→</div><div class="card better"><div class="tag">Better</div><div class="phrase">Guten Abend</div><div class="time">safe evening hello</div></div></div>
      <div class="note">Understandable and confident beats perfect today.</div>
    </div>
  </div>
  <script>
    (() => {
    window.__timelines=window.__timelines||{};
    const tl=gsap.timeline({paused:true,defaults:{ease:"power3.out"}});
    tl.fromTo(".eyebrow",{opacity:0,x:-40},{opacity:1,x:0,duration:.5},0)
      .fromTo(".title",{opacity:0,y:34},{opacity:1,y:0,duration:.62},.12)
      .fromTo(".wrong",{opacity:0,x:-220,rotationY:24},{opacity:1,x:0,rotationY:12,duration:.8},.38)
      .fromTo(".better",{opacity:0,x:220,rotationY:-24},{opacity:1,x:0,rotationY:-12,duration:.8},.48)
      .fromTo(".arrow",{opacity:0,scale:.6},{opacity:1,scale:1,duration:.52},.88)
      .fromTo(".tag",{opacity:0,y:-18},{opacity:1,y:0,duration:.42,stagger:.1},.92)
      .fromTo(".note",{opacity:0,y:18},{opacity:1,y:0,duration:.48},1.38);
    window.__timelines["m1l1-wrong-better"]=tl;
    })();
  </script>
</template></body></html>
