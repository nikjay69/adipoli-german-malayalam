<!doctype html>
<html><body><template>
  <style>
    #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; color: #f7f0dd; font-family: "EB Garamond", serif; }
    .ground { position: absolute; inset: 0; background: radial-gradient(circle at 18% 48%, rgba(241,210,122,.14), rgba(241,210,122,0) 28%), radial-gradient(circle at 82% 48%, rgba(157,196,255,.17), rgba(157,196,255,0) 28%), #0d1a0d; }
    .content { position: relative; width: 100%; height: 100%; padding: 86px 124px; display: grid; grid-template-columns: 300px 1fr 300px; grid-template-rows: auto 1fr auto; gap: 38px; align-items: center; }
    .eyebrow, .speaker, .cue, .note, .history-label { font-family: "IBM Plex Mono", monospace; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .eyebrow { grid-column: 1 / -1; color: #f1d27a; font-size: 21px; }
    .person { min-height: 590px; border-radius: 28px; border: 2px solid rgba(247,240,221,.14); background: rgba(22,36,22,.86); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; }
    .avatar { width: 150px; height: 150px; border-radius: 50%; display: grid; place-items: center; font: 700 64px/1 "Oswald", sans-serif; }
    .teacher .avatar { background: rgba(157,196,255,.15); color: #9dc4ff; border: 3px solid #9dc4ff; }
    .learner .avatar { background: rgba(241,210,122,.15); color: #f1d27a; border: 3px solid #f1d27a; }
    .speaker { font-size: 18px; text-align: center; color: #c8c2b1; }
    .stage { min-height: 590px; padding: 50px; border-radius: 28px; background: rgba(8,17,8,.62); border: 2px solid rgba(241,210,122,.28); display: flex; flex-direction: column; justify-content: space-between; }
    .history-label { color: #c8c2b1; font-size: 16px; }
    .history { display: flex; flex-direction: column; gap: 12px; color: rgba(200,194,177,.72); font-size: 28px; }
    .current { padding: 42px 46px; border-radius: 28px; background: #162416; border: 3px solid #f1d27a; font-size: 68px; line-height: 1.08; box-shadow: 0 25px 70px rgba(0,0,0,.28); }
    .cue { width: max-content; padding: 12px 18px; border-radius: 999px; background: rgba(241,210,122,.15); color: #f1d27a; font-size: 17px; }
    .note { grid-column: 1 / -1; display: flex; justify-content: space-between; color: #c8c2b1; font-size: 17px; }
    .meaning { color: #9dc4ff; }
  </style>
  <div id="root" data-composition-id="m1l1-dialogue" data-start="0" data-duration="12" data-width="1920" data-height="1080">
    <div id="m1l1-dialogue-ground" class="clip ground" data-start="0" data-duration="12" data-track-index="0"></div>
    <div id="m1l1-dialogue-content" class="clip content" data-start="0" data-duration="12" data-track-index="1">
      <div class="eyebrow">Your first tiny dialogue</div>
      <div class="person teacher"><div class="avatar">FW</div><div class="speaker">Frau Weber<br>listen</div></div>
      <div class="stage"><div><div class="history-label">Conversation history</div><div class="history"><div>Frau Weber: Guten Morgen.</div><div>You: Guten Morgen, Frau Weber.</div><div>Frau Weber: Lernen Sie Deutsch?</div></div></div><div class="current">Ja. Ich lerne Deutsch.</div><div class="cue">Your turn</div></div>
      <div class="person learner"><div class="avatar">DU</div><div class="speaker">Kuttan / you<br>answer</div></div>
      <div class="note"><span class="meaning">Lernen Sie Deutsch? = Are you learning German?</span><span>Current speaker stays large · one line at a time</span></div>
    </div>
  </div>
  <script>
    (() => {
    window.__timelines=window.__timelines||{};
    const tl=gsap.timeline({paused:true,defaults:{ease:"power3.out"}});
    tl.fromTo(".eyebrow",{opacity:0,x:-40},{opacity:1,x:0,duration:.5},0)
      .fromTo(".teacher",{opacity:0,x:-100},{opacity:1,x:0,duration:.72},.2)
      .fromTo(".learner",{opacity:0,x:100},{opacity:1,x:0,duration:.72},.3)
      .fromTo(".stage",{opacity:0,y:34,scale:.99},{opacity:1,y:0,scale:1,duration:.72},.38)
      .fromTo(".history > div",{opacity:0,y:18},{opacity:1,y:0,duration:.42,stagger:.24},.72)
      .fromTo(".current",{opacity:0,y:28,scale:.98},{opacity:1,y:0,scale:1,duration:.62},1.58)
      .fromTo(".cue",{opacity:0,x:-24},{opacity:1,x:0,duration:.42},1.86)
      .fromTo(".note span",{opacity:0,y:16},{opacity:1,y:0,duration:.44,stagger:.14},2.02);
    window.__timelines["m1l1-dialogue"]=tl;
    })();
  </script>
</template></body></html>
