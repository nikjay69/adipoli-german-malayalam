<!doctype html>
<html><body><template>
  <style>
    #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; color: #f7f0dd; font-family: "EB Garamond", serif; }
    .ground { position: absolute; inset: 0; background: radial-gradient(circle at 32% 38%, rgba(241,210,122,.16), rgba(241,210,122,0) 38%), #0d1a0d; }
    .ruled { position: absolute; inset: 0; opacity: .13; background-image: repeating-linear-gradient(0deg, transparent 0, transparent 79px, rgba(247,240,221,.28) 80px, transparent 82px); }
    .content { position: relative; width: 100%; height: 100%; padding: 96px 144px; display: flex; flex-direction: column; justify-content: center; gap: 48px; }
    .eyebrow, .translation, .meaning, .distinction, .owned { font-family: "IBM Plex Mono", monospace; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; }
    .eyebrow { color: #f1d27a; font-size: 22px; }
    .sentence { font-size: 126px; line-height: .96; letter-spacing: -.035em; }
    .underline { width: 1050px; height: 6px; border-radius: 999px; background: #f1d27a; }
    .translation { color: #c8c2b1; font-size: 22px; }
    .chunks { display: grid; grid-template-columns: .7fr 1fr 1.25fr; gap: 28px; }
    .chunk { min-height: 220px; padding: 38px; border: 2px solid rgba(241,210,122,.26); border-radius: 28px; background: rgba(22,36,22,.88); display: flex; flex-direction: column; justify-content: space-between; }
    .word { font-size: 68px; }
    .meaning { color: #c8c2b1; font-size: 17px; }
    .footer { display: flex; justify-content: space-between; align-items: center; }
    .distinction { color: #9dc4ff; font-size: 18px; }
    .owned { color: #bcf7d0; font-size: 18px; }
  </style>
  <div id="root" data-composition-id="m1l1-first-sentence" data-start="0" data-duration="10" data-width="1920" data-height="1080">
    <div id="m1l1-first-sentence-ground" class="clip ground" data-start="0" data-duration="10" data-track-index="0"></div>
    <div id="m1l1-first-sentence-content" class="clip content" data-start="0" data-duration="10" data-track-index="1">
      <div class="ruled"></div><div class="eyebrow">Your first sentence</div><div class="sentence">Ich lerne Deutsch.</div><div class="underline"></div><div class="translation">I am learning German.</div>
      <div class="chunks"><div class="chunk"><div class="word">Ich</div><div class="meaning">I</div></div><div class="chunk"><div class="word">lerne</div><div class="meaning">learn / am learning</div></div><div class="chunk"><div class="word">Deutsch</div><div class="meaning">German language</div></div></div>
      <div class="footer"><div class="distinction">Deutsch ≠ Deutschland</div><div class="owned">1 sentence owned</div></div>
    </div>
  </div>
  <script>
    (() => {
    window.__timelines=window.__timelines||{};
    const tl=gsap.timeline({paused:true,defaults:{ease:"power3.out"}});
    tl.fromTo(".eyebrow",{opacity:0,x:-38},{opacity:1,x:0,duration:.5},0)
      .fromTo(".sentence",{opacity:0,y:42,scale:.985},{opacity:1,y:0,scale:1,duration:.72},.12)
      .fromTo(".underline",{scaleX:0,transformOrigin:"left center"},{scaleX:1,duration:.82,ease:"power2.out"},.64)
      .fromTo(".translation",{opacity:0,y:18},{opacity:1,y:0,duration:.45},.88)
      .fromTo(".chunk",{opacity:0,y:36,scale:.98},{opacity:1,y:0,scale:1,duration:.56,stagger:.13},1.08)
      .fromTo(".footer > div",{opacity:0,x:28},{opacity:1,x:0,duration:.46,stagger:.14},1.64);
    window.__timelines["m1l1-first-sentence"]=tl;
    })();
  </script>
</template></body></html>
