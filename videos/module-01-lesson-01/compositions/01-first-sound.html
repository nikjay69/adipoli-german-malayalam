<!doctype html>
<html><body><template>
  <style>
    #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; color: #f7f0dd; font-family: "EB Garamond", serif; }
    .ground { position: absolute; inset: 0; background: radial-gradient(circle at 78% 25%, rgba(241,210,122,.20), rgba(241,210,122,0) 35%), #0d1a0d; }
    .ghost { position: absolute; right: -50px; top: 110px; font: 700 270px/1 "Oswald", sans-serif; letter-spacing: -.04em; color: rgba(241,210,122,.08); }
    .content { position: relative; width: 100%; height: 100%; padding: 96px 144px; display: grid; grid-template-columns: 1.35fr .65fr; gap: 90px; align-items: center; }
    .meta, .cue, .instruction { font: 700 22px/1.2 "IBM Plex Mono", monospace; letter-spacing: .12em; text-transform: uppercase; }
    .meta { position: absolute; left: 144px; top: 96px; color: #f1d27a; }
    .hero { display: flex; flex-direction: column; gap: 26px; }
    .cue { color: #9dc4ff; }
    .phrase { font-size: 154px; line-height: .98; letter-spacing: -.035em; max-width: 1050px; }
    .rule { width: 720px; height: 5px; border-radius: 999px; background: #f1d27a; }
    .instruction { color: #c8c2b1; }
    .audio-panel { min-height: 520px; padding: 48px; border: 2px solid rgba(241,210,122,.28); border-radius: 28px; background: rgba(22,36,22,.88); display: flex; flex-direction: column; justify-content: space-between; }
    .audio-label { font: 700 20px/1.2 "IBM Plex Mono", monospace; color: #9dc4ff; letter-spacing: .1em; }
    .wave { height: 260px; display: flex; align-items: center; justify-content: center; gap: 14px; }
    .bar { width: 18px; border-radius: 9px; background: #f1d27a; }
    .bar:nth-child(1), .bar:nth-child(9) { height: 64px; opacity: .45; }
    .bar:nth-child(2), .bar:nth-child(8) { height: 118px; opacity: .58; }
    .bar:nth-child(3), .bar:nth-child(7) { height: 178px; opacity: .72; }
    .bar:nth-child(4), .bar:nth-child(6) { height: 226px; opacity: .86; }
    .bar:nth-child(5) { height: 260px; }
    .safe-note { font: 700 18px/1.4 "IBM Plex Mono", monospace; color: #c8c2b1; letter-spacing: .08em; }
    .corner { position: absolute; width: 34px; height: 34px; border-color: rgba(241,210,122,.55); }
    .tl { left: 96px; top: 64px; border-left: 3px solid; border-top: 3px solid; }
    .br { right: 96px; bottom: 64px; border-right: 3px solid; border-bottom: 3px solid; }
  </style>
  <div id="root" data-composition-id="m1l1-first-sound" data-start="0" data-duration="7" data-width="1920" data-height="1080">
    <div id="m1l1-first-sound-ground" class="clip ground" data-start="0" data-duration="7" data-track-index="0"></div>
    <div id="m1l1-first-sound-content" class="clip content" data-start="0" data-duration="7" data-track-index="1">
      <div class="ghost" aria-hidden="true" data-layout-ignore data-layout-allow-overflow>MORGEN</div><div class="meta">Module 01 · Lesson 01</div>
      <div class="hero"><div class="cue">Frau Weber · model audio</div><div class="phrase">Guten Morgen.</div><div class="rule"></div><div class="instruction">Listen → copy</div></div>
      <div class="audio-panel"><div class="audio-label">First sound</div><div class="wave"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div><div class="safe-note">Presenter-safe zone · future video / reaction</div></div>
      <span class="corner tl"></span><span class="corner br"></span>
    </div>
  </div>
  <script>
    (() => {
    window.__timelines=window.__timelines||{};
    const tl=gsap.timeline({paused:true,defaults:{ease:"power3.out"}});
    tl.fromTo(".meta",{opacity:0,y:-24},{opacity:1,y:0,duration:.55},0)
      .fromTo(".cue",{opacity:0,x:-46},{opacity:1,x:0,duration:.55},.18)
      .fromTo(".phrase",{opacity:0,y:44,scale:.97},{opacity:1,y:0,scale:1,duration:.72},.28)
      .fromTo(".rule",{scaleX:0,transformOrigin:"left center"},{scaleX:1,duration:.7,ease:"power2.out"},.66)
      .fromTo(".instruction",{opacity:0,y:18},{opacity:1,y:0,duration:.45},1.02)
      .fromTo(".audio-panel",{opacity:0,x:70},{opacity:1,x:0,duration:.75},.24)
      .fromTo(".bar",{scaleY:0,transformOrigin:"bottom center"},{scaleY:1,duration:.62,stagger:.055,ease:"power3.out"},.72)
      .fromTo(".ghost",{opacity:0,x:45},{opacity:1,x:0,duration:1.2,ease:"sine.inOut"},.15);
    window.__timelines["m1l1-first-sound"]=tl;
    })();
  </script>
</template></body></html>
