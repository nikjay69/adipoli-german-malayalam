<g id="QUESTION-3"><rect x="80" y="580" width="430" height="165" rx="24" fill="#FFFFFF" stroke="#102018" stroke-opacity=".14" stroke-width="3"/><text x="115" y="648" class="serif" font-size="51" fill="#102018"><tspan fill="#8A5A2A">W</tspan>o?</text><text x="115" y="702" class="ui" font-size="30" fill="#66756A">where · എവിടെ?</text></g>
