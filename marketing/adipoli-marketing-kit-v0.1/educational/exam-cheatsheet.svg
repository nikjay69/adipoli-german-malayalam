<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-label="Adipoli German exam-format cheatsheet">
  <title>Adipoli German exam-format cheatsheet</title>
  <style>
  .impact { font-family: 'Archivo', 'Arial Narrow', Arial, sans-serif; font-weight: 800; }
  .serif { font-family: 'Source Serif 4', Georgia, serif; font-weight: 600; }
  .ui { font-family: 'Geist', Arial, sans-serif; }
  .mono { font-family: 'Geist Mono', 'Courier New', monospace; }
  text { text-rendering: geometricPrecision; }
</style>

  <rect width="1080" height="1350" fill="#102018"/><text x="1040" y="1340" text-anchor="end" class="impact" font-size="600" fill="#F5F0E8" opacity=".04">A1</text>
  <text x="80" y="115" class="mono" font-size="29" font-weight="700" letter-spacing="5" fill="#D4A520">PRÜFUNGS-SPICKZETTEL</text><g id="triangle-a" transform="translate(945 70) scale(1)" opacity="1">
    <path d="M24 6 L40 40 H33.6 L24 19.4 L14.4 40 H8 Z" fill="#F5F0E8"/>
    <path d="M20.7 32 H27.3 L31 40 H17 Z" fill="#D4A520"/>
  </g>
  <text x="80" y="275" class="serif" font-size="73" fill="#F5F0E8"><tspan x="80">Goethe A1: the exam</tspan><tspan x="80" dy="85">at a <tspan fill="#F1D27A" font-style="italic">glance</tspan></tspan></text>
  <g id="EDITABLE-OWNER-VERIFIED-FACTS"><g><rect x="80" y="485" width="920" height="100" rx="18" fill="#F5F0E8" opacity=".07"/><text x="115" y="548" class="ui" font-size="36" fill="#F5F0E8"><tspan font-weight="700">Hören</tspan> · 3 Teile</text><text x="955" y="548" text-anchor="end" class="mono" font-size="31" fill="#F1D27A">≈20 MIN</text></g>
<g><rect x="80" y="615" width="920" height="100" rx="18" fill="#F5F0E8" opacity=".07"/><text x="115" y="678" class="ui" font-size="36" fill="#F5F0E8"><tspan font-weight="700">Lesen</tspan> · 3 Teile</text><text x="955" y="678" text-anchor="end" class="mono" font-size="31" fill="#F1D27A">≈25 MIN</text></g>
<g><rect x="80" y="745" width="920" height="100" rx="18" fill="#F5F0E8" opacity=".07"/><text x="115" y="808" class="ui" font-size="36" fill="#F5F0E8"><tspan font-weight="700">Schreiben</tspan> · 2 Teile</text><text x="955" y="808" text-anchor="end" class="mono" font-size="31" fill="#F1D27A">≈20 MIN</text></g>
<g><rect x="80" y="875" width="920" height="100" rx="18" fill="#F5F0E8" opacity=".07"/><text x="115" y="938" class="ui" font-size="36" fill="#F5F0E8"><tspan font-weight="700">Sprechen</tspan> · 3 Teile</text><text x="955" y="938" text-anchor="end" class="mono" font-size="31" fill="#F1D27A">≈15 MIN</text></g></g>
  <text x="80" y="1095" class="ui" font-size="28" fill="#8FA093"><tspan x="80">Format summary for orientation — always confirm current</tspan><tspan x="80" dy="44">details with the exam centre.</tspan></text>
  <rect x="80" y="1190" width="460" height="58" rx="10" fill="#F1D27A" opacity=".16"/><text x="105" y="1228" class="mono" font-size="24" fill="#F1D27A">[OWNER VERIFIES FACTS]</text>

  <g id="EDITING-GUIDES" style="display:none"><rect x="60" y="60" width="960" height="1230" fill="none" stroke="#B95B33" stroke-width="4" stroke-dasharray="14 12"/><text x="72" y="90" class="mono" font-size="20" fill="#B95B33">FEED SAFE AREA · 60 PX</text></g>
</svg>
