<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-label="Adipoli German reel end card">
  <title>Adipoli German reel end card</title>
  <style>
  .impact { font-family: 'Archivo', 'Arial Narrow', Arial, sans-serif; font-weight: 800; }
  .serif { font-family: 'Source Serif 4', Georgia, serif; font-weight: 600; }
  .ui { font-family: 'Geist', Arial, sans-serif; }
  .mono { font-family: 'Geist Mono', 'Courier New', monospace; }
  text { text-rendering: geometricPrecision; }
</style>

  <rect width="1080" height="1920" fill="#102018"/>
  <g id="triangle-a" transform="translate(432 320) scale(4.5)" opacity="1">
