  <g id="EDITING-GUIDES" style="display:none"><rect x="60" y="140" width="960" height="1640" fill="none" stroke="#B95B33" stroke-width="4" stroke-dasharray="14 12"/><text x="72" y="170" class="mono" font-size="20" fill="#B95B33">REEL SAFE AREA · 140 PX TOP/BOTTOM</text></g>
