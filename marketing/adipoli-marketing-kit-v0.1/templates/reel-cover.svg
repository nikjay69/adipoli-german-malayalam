  <defs><linearGradient id="reel-shade" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0C1811" stop-opacity=".5"/><stop offset=".34" stop-color="#0C1811" stop-opacity=".12"/><stop offset=".64" stop-color="#0C1811" stop-opacity=".8"/><stop offset="1" stop-color="#0C1811" stop-opacity=".98"/></linearGradient></defs>
  <g id="EDITABLE-SCENE"><rect x="0" y="0" width="1080" height="1920" fill="#0C1811"/><image href="../assets/scenes/hub-chayakkada.jpg" x="0" y="0" width="1080" height="1920" preserveAspectRatio="xMidYMid slice"/></g>
