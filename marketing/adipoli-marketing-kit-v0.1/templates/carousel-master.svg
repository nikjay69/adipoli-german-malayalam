    <path d="M20.7 32 H27.3 L31 40 H17 Z" fill="#D4A520"/>
  </g><text x="540" y="650" text-anchor="middle" class="serif" font-size="72" fill="#F5F0E8">Build evidence that</text><text x="540" y="735" text-anchor="middle" class="serif" font-size="72" fill="#F5F0E8">you’re A1 ready.</text><text x="540" y="900" text-anchor="middle" class="ui" font-size="34" fill="#D4A520">[HANDLE TBD]</text></g>

