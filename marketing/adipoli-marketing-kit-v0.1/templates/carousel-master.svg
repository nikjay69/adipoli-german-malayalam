      <text x="80" y="640" class="serif" font-size="74" fill="#F5F0E8"><tspan x="80">Hook slide asks the</tspan><tspan x="80" dy="92">question your learner</tspan><tspan x="80" dy="92">is already asking.</tspan></text>
      <text x="80" y="1200" class="ui" font-size="31" font-weight="500" fill="#8FA093">Swipe → · 5–7 slides · last slide is always the quiet CTA</text>
    </g>
  </g>
  <g id="VARIANT-CONTENT" style="display:none"><rect width="1080" height="1350" fill="#F5F0E8"/><text x="80" y="120" class="mono" font-size="28" fill="#B95B33">02 · CONTENT</text><text x="80" y="300" class="serif" font-size="72" fill="#102018">One idea per slide.</text><rect x="80" y="390" width="920" height="620" rx="24" fill="#FFFFFF" stroke="#102018" stroke-opacity=".16"/><text x="120" y="470" class="ui" font-size="36" fill="#66756A">[EDITABLE CONTENT]</text><g id="brand-lockup"><g id="triangle-a" transform="translate(80 1180) scale(1)" opacity="1">
    <path d="M24 6 L40 40 H33.6 L24 19.4 L14.4 40 H8 Z" fill="#102018"/>
    <path d="M20.7 32 H27.3 L31 40 H17 Z" fill="#D4A520"/>
  </g><text x="152" y="1210.72" class="impact" font-size="16.32" letter-spacing="0.5" fill="#102018">ADIPOLI GERMAN</text></g></g>
  <g id="VARIANT-QUIET-CTA" style="display:none"><rect width="1080" height="1350" fill="#102018"/><g id="triangle-a" transform="translate(432 250) scale(4.5)" opacity="1">
